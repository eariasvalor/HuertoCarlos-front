<div class="login-wrapper">
  <div class="login-card">

    <div class="login-header">
      <div class="tomato-icon">🍅</div>
      <h1>El Huerto de Carlos</h1>
      <p>Admin access</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="admin@huerto.com"
          [class.error]="email?.invalid && email?.touched"
        />
        @if (email?.invalid && email?.touched) {
          <span class="error-msg">Please enter a valid email</span>
        }
      </div>

      <div class="form-group">
        <label for="rawPassword">Password</label>
        <input
          id="rawPassword"
          type="password"
          formControlName="rawPassword"
          placeholder="••••••••"
          [class.error]="rawPassword?.invalid && rawPassword?.touched"
        />
        @if (rawPassword?.invalid && rawPassword?.touched) {
          <span class="error-msg">Password must be at least 8 characters</span>
        }
      </div>

      @if (errorMessage()) {
        <div class="alert-error">{{ errorMessage() }}</div>
      }

      <button type="submit" [disabled]="form.invalid || isLoading()">
        @if (isLoading()) { Signing in... } @else { Sign in }
      </button>

    </form>

    <div class="login-footer">
      <a routerLink="/login">← Customer login</a>
    </div>

    <div class="tagline">Admin panel · El Huerto de Carlos</div>

  </div>
</div>
